<!doctype html><html><head><meta charset="utf-8"><title>Colors — Civic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:#f8fafc;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sw{border-radius:8px;overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.06),0 6px 14px -10px rgba(15,23,42,.25)}
  .chip{height:70px;display:flex;align-items:flex-end;justify-content:flex-start;padding:8px;color:#fff;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  .meta{padding:6px 8px;background:#fff;font-size:11px;line-height:1.3}
  .meta b{display:block;font-family:var(--font-mono);font-size:10.5px;color:#0f172a}
  .meta span{color:#64748b}
  .dark{color:#fff}
  .light{color:#0f172a}
</style></head><body><div class="grid">
  <div class="sw"><div class="chip" style="background:#10b981">Go / Success</div><div class="meta"><b>emerald</b><span>#10B981</span></div></div>
  <div class="sw"><div class="chip" style="background:#047857">Emerald-Dark</div><div class="meta"><b>emerald-dark</b><span>#047857</span></div></div>
  <div class="sw"><div class="chip" style="background:#f59e0b">Warning</div><div class="meta"><b>warning</b><span>#F59E0B</span></div></div>
  <div class="sw"><div class="chip" style="background:#ef4444">Danger</div><div class="meta"><b>danger</b><span>#EF4444</span></div></div>
  <div class="sw"><div class="chip" style="background:#334155">Slate</div><div class="meta"><b>slate</b><span>#334155</span></div></div>
  <div class="sw"><div class="chip" style="background:#0f172a">Slate-Dark</div><div class="meta"><b>slate-dark</b><span>#0F172A</span></div></div>
  <div class="sw"><div class="chip" style="background:#64748b">Slate-Light</div><div class="meta"><b>slate-light</b><span>#64748B</span></div></div>
  <div class="sw"><div class="chip light" style="background:#f8fafc">Bone</div><div class="meta"><b>bone</b><span>#F8FAFC</span></div></div>
</div></body></html>

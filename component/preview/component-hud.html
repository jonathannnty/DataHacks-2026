<!doctype html><html><head><meta charset="utf-8"><title>HUD</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap">
<style>
body{margin:0;padding:16px;background:#6b4a2b;background-image:repeating-linear-gradient(95deg,rgba(26,20,16,.12) 0 1px,transparent 1px 3px,rgba(255,235,200,.04) 3px 7px);font-family:'IBM Plex Sans',sans-serif}
.hud{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;background:rgba(255,255,255,.82);backdrop-filter:blur(6px);padding:14px;border-radius:10px;box-shadow:0 1px 0 rgba(0,0,0,.05),0 10px 24px -12px rgba(59,42,26,.4);border:1px solid rgba(107,74,43,.2)}
.m{display:flex;flex-direction:column;gap:6px}
.l{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#334155}
.l .v{font-family:'JetBrains Mono',monospace;font-weight:500;color:#0f172a;font-variant-numeric:tabular-nums;letter-spacing:0}
.bar{
  position:relative;
  height:12px;
  background:#e7e1cf;
  border:1px solid rgba(107,74,43,.35);
  border-radius:2px;
  overflow:hidden;
}
/* 5 segment dividers at 20/40/60/80 */
.bar::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:2;
  background-image:
    linear-gradient(90deg,
      transparent 0 calc(20% - .5px), rgba(26,20,16,.55) calc(20% - .5px) calc(20% + .5px),
      transparent calc(20% + .5px) calc(40% - .5px), rgba(26,20,16,.55) calc(40% - .5px) calc(40% + .5px),
      transparent calc(40% + .5px) calc(60% - .5px), rgba(26,20,16,.55) calc(60% - .5px) calc(60% + .5px),
      transparent calc(60% + .5px) calc(80% - .5px), rgba(26,20,16,.55) calc(80% - .5px) calc(80% + .5px),
      transparent calc(80% + .5px) 100%);
}
.fill{height:100%;position:relative;z-index:1;box-shadow:inset 0 -2px 0 rgba(0,0,0,.18)}
.g{background:#10b981}.gd{background:#047857}.w{background:#f59e0b}.d{background:#a8242b}

/* small tick labels under bar */
.ticks{display:flex;justify-content:space-between;margin-top:-2px;font-family:'JetBrains Mono',monospace;font-size:8.5px;color:#8d6a3e;letter-spacing:0}
.ticks span{transform:translateX(-50%)}
.ticks span:first-child{transform:none}
.ticks span:last-child{transform:translateX(0)}
</style></head><body>
<div class="hud">
  <div class="m">
    <div class="l"><span>$ Treasury</span><span class="v">62</span></div>
    <div class="bar"><div class="fill g" style="width:62%"></div></div>
  </div>
  <div class="m">
    <div class="l"><span>Eco-Health</span><span class="v">81</span></div>
    <div class="bar"><div class="fill gd" style="width:81%"></div></div>
  </div>
  <div class="m">
    <div class="l"><span>Sentiment</span><span class="v">47</span></div>
    <div class="bar"><div class="fill w" style="width:47%"></div></div>
  </div>
  <div class="m">
    <div class="l"><span>Infra-Load</span><span class="v">88</span></div>
    <div class="bar"><div class="fill d" style="width:88%"></div></div>
  </div>
  <div class="m">
    <div class="l"><span>Social Equity</span><span class="v">34</span></div>
    <div class="bar"><div class="fill w" style="width:34%"></div></div>
  </div>
</div>
</body></html>

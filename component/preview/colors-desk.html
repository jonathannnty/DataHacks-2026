<!doctype html><html><head><meta charset="utf-8"><title>Colors — Desk</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:#faf6ec;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:8px;overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.06),0 6px 14px -10px rgba(59,42,26,.4)}
  .chip{height:70px}
  .meta{padding:6px 8px;background:#fff;font-size:11px;line-height:1.3;color:#3b2e24}
  .meta b{display:block;font-family:var(--font-mono);font-size:10.5px;color:#1a1410}
  .meta span{color:#6b4a2b}
</style></head><body><div class="grid">
  <div class="sw"><div class="chip" style="background:#3b2a1a"></div><div class="meta"><b>oak-900</b><span>#3B2A1A</span></div></div>
  <div class="sw"><div class="chip" style="background:#6b4a2b"></div><div class="meta"><b>oak-700</b><span>#6B4A2B</span></div></div>
  <div class="sw"><div class="chip" style="background:#8d6a3e"></div><div class="meta"><b>oak-500</b><span>#8D6A3E</span></div></div>
  <div class="sw"><div class="chip" style="background:#c9a66b"></div><div class="meta"><b>oak-300</b><span>#C9A66B</span></div></div>
  <div class="sw"><div class="chip" style="background:#a8242b"></div><div class="meta"><b>wax-red</b><span>#A8242B</span></div></div>
  <div class="sw"><div class="chip" style="background:#f5ecd7"></div><div class="meta"><b>paper-50</b><span>#F5ECD7</span></div></div>
  <div class="sw"><div class="chip" style="background:#ede1c4"></div><div class="meta"><b>paper-100</b><span>#EDE1C4</span></div></div>
  <div class="sw"><div class="chip" style="background:#d9c99e"></div><div class="meta"><b>paper-200</b><span>#D9C99E</span></div></div>
  <div class="sw"><div class="chip" style="background:#1a1410"></div><div class="meta"><b>ink-900</b><span>#1A1410</span></div></div>
  <div class="sw"><div class="chip" style="background:#3b2e24"></div><div class="meta"><b>ink-700</b><span>#3B2E24</span></div></div>
</div></body></html>

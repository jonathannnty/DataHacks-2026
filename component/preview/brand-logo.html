<!doctype html><html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@700;800&display=swap">
<style>
body{margin:0;padding:28px;background:#f5ecd7;display:flex;flex-direction:column;gap:22px;align-items:center;justify-content:center;font-family:Inter}
.mark{display:flex;align-items:center;gap:14px}
.mark svg{display:block;overflow:visible}
.wm{font-family:'Special Elite';font-size:32px;color:#1a1410;line-height:1}
.wm i{font-style:normal;color:#047857}
.sub{font-family:Inter;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#8d6a3e;margin-top:4px}
.inv{background:#0f172a;padding:16px 20px;border-radius:10px}
.inv .wm{color:#fff}.inv .wm i{color:#34d399}.inv .sub{color:#94a3b8}
</style></head><body>

<!-- Kicked-over can mark. No solid badge. Can lies on the ground, tilted a few degrees so it's NOT flat — like it rocked & settled lopsided. Trash spills from the open end. A scuffed ground line sits under it. -->
<template id="mark-tpl">
<svg viewBox="0 0 74 64" width="72" height="62" aria-label="Kicked-over trash can">
  <!-- ground shadow (squashed, tilted with the can) -->
  <ellipse cx="36" cy="56" rx="30" ry="3.2" fill="#1a1410" opacity=".18"/>

  <!-- scuff / ground line with kick marks -->
  <path d="M4 58 L68 58" stroke="#8d6a3e" stroke-width=".9" stroke-dasharray="1 2.2" opacity=".7"/>
  <!-- kick cloud -->
  <g opacity=".55" fill="none" stroke="#8d6a3e" stroke-width=".9" stroke-linecap="round">
    <path d="M60 50 q2 -2 5 -1"/>
    <path d="M62 54 q3 -1 6 -.5"/>
    <path d="M63 46 q1 -2 3 -2"/>
    <circle cx="67" cy="48" r=".9" fill="#8d6a3e" stroke="none"/>
    <circle cx="65" cy="52" r=".7" fill="#8d6a3e" stroke="none"/>
  </g>
  <!-- motion lines trailing the direction of the kick (right-to-left force) -->
  <g stroke="#1a1410" stroke-width=".8" stroke-linecap="round" opacity=".45">
    <line x1="58" y1="30" x2="65" y2="28"/>
    <line x1="59" y1="36" x2="67" y2="36"/>
    <line x1="58" y1="42" x2="64" y2="43"/>
  </g>

  <!-- THE CAN: lies horizontally, rotated ~8° so it looks lopsided / mid-rock.
       Drawn in a local frame centered at (36,46) and rotated. -->
  <g transform="translate(36 46) rotate(-6)">
    <!-- Light touch: the can's "bottom" (closed end) is on the right, mouth on the left where trash spills. -->

    <!-- back closed end (darker disk) -->
    <ellipse cx="22" cy="0" rx="4" ry="11" fill="#065f46"/>
    <ellipse cx="22" cy="0" rx="4" ry="11" fill="none" stroke="#1a1410" stroke-width="1"/>

    <!-- body tube -->
    <rect x="-20" y="-11" width="42" height="22" fill="#047857" stroke="#1a1410" stroke-width="1.1"/>
    <!-- ribs (corrugation) -->
    <g stroke="#1a1410" stroke-opacity=".35" stroke-width=".9">
      <line x1="-12" y1="-11" x2="-12" y2="11"/>
      <line x1="-4"  y1="-11" x2="-4"  y2="11"/>
      <line x1="4"   y1="-11" x2="4"   y2="11"/>
      <line x1="12"  y1="-11" x2="12"  y2="11"/>
    </g>
    <!-- top & bottom rolled rims on body -->
    <rect x="-20" y="-12" width="42" height="2" fill="#065f46" stroke="#1a1410" stroke-width=".9"/>
    <rect x="-20" y="10"  width="42" height="2" fill="#065f46" stroke="#1a1410" stroke-width=".9"/>
    <!-- highlight on upper curve -->
    <path d="M-18 -8 Q0 -10 20 -8" stroke="#6ee7b7" stroke-width="1" fill="none" opacity=".55"/>

    <!-- side handle (visible on the top/side of the tipped can) -->
    <path d="M 6 -11 q 0 -3 -3 -3 q -3 0 -3 3" fill="none" stroke="#1a1410" stroke-width="1.2"/>

    <!-- open mouth (facing left, trash spills out this way) -->
    <ellipse cx="-20" cy="0" rx="4" ry="11" fill="#1a1410"/>
    <ellipse cx="-19.3" cy="0" rx="3" ry="9.5" fill="#064e3b"/>
    <!-- dented / lopsided inner rim -->
    <ellipse cx="-19.3" cy="0" rx="3" ry="9.5" fill="none" stroke="#1a1410" stroke-width=".7" opacity=".6"/>

    <!-- lid, flopped open past the mouth, hanging on by a tether -->
    <g transform="translate(-24 8) rotate(-55)">
      <ellipse cx="0" cy="0" rx="10" ry="3" fill="#047857" stroke="#1a1410" stroke-width="1"/>
      <ellipse cx="0" cy="-.6" rx="8.4" ry="2.2" fill="#065f46"/>
      <rect x="-1.4" y="-1" width="2.8" height="2" fill="#1a1410" opacity=".55"/>
    </g>
    <!-- tether from rim to lid -->
    <path d="M-21 6 Q -23 10 -25 12" stroke="#1a1410" stroke-width=".9" fill="none"/>

    <!-- little dent at the top from where it got kicked -->
    <path d="M2 -12 q 3 2 6 0" stroke="#1a1410" stroke-width="1" fill="none"/>
    <path d="M3 -12.5 q 2 1 4 0" stroke="#065f46" stroke-width="1.2" fill="none"/>
  </g>

  <!-- SPILLED TRASH — drawn in world coords, piled against ground + to the left of the mouth -->
  <g>
    <!-- banana peel -->
    <g transform="translate(14 50) rotate(-18)">
      <path d="M-7 0 q-2 -4 2 -5 q5 -1 9 2 q-1 2 -4 2 q-4 0 -7 1z" fill="#fbbf24" stroke="#1a1410" stroke-width=".8"/>
      <path d="M-5 -2 q3 -1 7 1" stroke="#1a1410" stroke-width=".5" fill="none" opacity=".6"/>
    </g>

    <!-- crumpled newspaper / paper -->
    <g transform="translate(24 52) rotate(10)">
      <path d="M-6 -2 q-2 -3 1 -4 q3 -1 5 0 q2 -1 3 1 q1 2 -1 4 q1 2 -2 3 q-4 1 -6 -4z" fill="#fafaf9" stroke="#1a1410" stroke-width=".8"/>
      <path d="M-3 -1 l3 -1 M-1 1 l3 -1 M-2 2 l3 0" stroke="#1a1410" stroke-width=".4" opacity=".6" fill="none"/>
    </g>

    <!-- apple core -->
    <g transform="translate(9 55)">
      <path d="M-2 -1 q-1.5 0 -1.5 1.8 q0 1.8 1.6 2 q.6 .8 1.9 .8 q1.3 0 1.9 -.8 q1.6 -.2 1.6 -2 q0 -1.8 -1.5 -1.8 q-.8 0 -1.3 .5 q-.5 -.5 -1.3 -.5z" fill="#f5ecd7" stroke="#1a1410" stroke-width=".8"/>
      <path d="M0 -2 l.6 -1.3" stroke="#1a1410" stroke-width=".7" fill="none"/>
      <path d="M.6 -3.3 q1 -.2 1.4 .5" stroke="#16a34a" stroke-width=".9" fill="none"/>
    </g>

    <!-- bottle cap -->
    <g transform="translate(32 55)">
      <circle r="2" fill="#dc2626" stroke="#1a1410" stroke-width=".7"/>
      <circle r="2" fill="none" stroke="#1a1410" stroke-width=".3" stroke-dasharray=".6 .6"/>
    </g>

    <!-- fish bone -->
    <g transform="translate(42 54) rotate(8)" stroke="#1a1410" stroke-width=".7" fill="none">
      <circle cx="6" cy="0" r="1.3" fill="#fafaf9"/>
      <circle cx="7" cy="-.3" r=".3" fill="#1a1410"/>
      <line x1="5" y1="0" x2="-5" y2="0"/>
      <line x1="3" y1="-1.5" x2="3" y2="1.5"/>
      <line x1="1" y1="-1.8" x2="1" y2="1.8"/>
      <line x1="-1" y1="-1.5" x2="-1" y2="1.5"/>
      <line x1="-3" y1="-1.2" x2="-3" y2="1.2"/>
      <path d="M-5 0 l-2 -1.5 M-5 0 l-2 1.5"/>
    </g>

    <!-- crumbs / bits -->
    <circle cx="5" cy="56" r=".8" fill="#1a1410" opacity=".65"/>
    <circle cx="19" cy="57" r=".6" fill="#1a1410" opacity=".5"/>
    <circle cx="28" cy="57" r=".5" fill="#1a1410" opacity=".5"/>
    <circle cx="38" cy="57" r=".6" fill="#1a1410" opacity=".5"/>

    <!-- a stink line or two rising from the mouth -->
    <g stroke="#065f46" stroke-width=".9" stroke-linecap="round" fill="none" opacity=".55">
      <path d="M6 42 q2 -3 0 -6 q-2 -3 0 -6"/>
      <path d="M12 38 q2 -3 0 -6 q-2 -3 0 -6"/>
    </g>
  </g>
</svg>
</template>

<!-- Light variant: use as-is against any light surface -->
<div class="mark" id="light">
  <div><div class="wm"><i>Waste</i>Ville</div><div class="sub">Office of the Waste Czar</div></div>
</div>

<!-- Dark variant: only the text block gets a chip, can mark stays transparent -->
<div class="mark inv" id="dark">
  <div><div class="wm"><i>Waste</i>Ville</div><div class="sub">Civic Simulator · MMXXVI</div></div>
</div>

<script>
const tpl = document.getElementById('mark-tpl');
// inject the SVG directly at the start of each .mark — no badge behind it
document.querySelectorAll('.mark').forEach(m=>{
  const svg = tpl.content.cloneNode(true);
  m.insertBefore(svg, m.firstChild);
});
// on the dark variant, recolor the can's greens to mint so it reads on navy
const darkSvg = document.querySelector('#dark svg');
if(darkSvg){
  darkSvg.querySelectorAll('[fill="#047857"]').forEach(n=>n.setAttribute('fill','#10b981'));
  darkSvg.querySelectorAll('[fill="#065f46"]').forEach(n=>n.setAttribute('fill','#047857'));
  darkSvg.querySelectorAll('[fill="#064e3b"]').forEach(n=>n.setAttribute('fill','#022c22'));
  // outlines → warm off-white so they read
  darkSvg.querySelectorAll('[stroke="#1a1410"]').forEach(n=>n.setAttribute('stroke','#f5ecd7'));
  darkSvg.querySelectorAll('[fill="#1a1410"]').forEach(n=>n.setAttribute('fill','#f5ecd7'));
  darkSvg.querySelectorAll('[stroke="#8d6a3e"]').forEach(n=>n.setAttribute('stroke','#94a3b8'));
  darkSvg.querySelectorAll('[fill="#8d6a3e"]').forEach(n=>n.setAttribute('fill','#94a3b8'));
  darkSvg.querySelectorAll('[fill="#fafaf9"]').forEach(n=>n.setAttribute('fill','#e2e8f0'));
}
</script>
</body></html>

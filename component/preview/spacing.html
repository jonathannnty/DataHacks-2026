<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap">
<style>body{margin:0;padding:16px;background:#fff;font-family:Inter;color:#1a1410}
.row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.bar{background:#10b981;height:14px;border-radius:3px}
.t{font-family:'JetBrains Mono';font-size:12px;color:#3b2e24;width:46px}
.l{font-family:Inter;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748b;width:44px}</style>
</head><body>
<div class="row"><div class="t">4</div><div class="l">sp-1</div><div class="bar" style="width:4px"></div></div>
<div class="row"><div class="t">8</div><div class="l">sp-2</div><div class="bar" style="width:8px"></div></div>
<div class="row"><div class="t">12</div><div class="l">sp-3</div><div class="bar" style="width:12px"></div></div>
<div class="row"><div class="t">16</div><div class="l">sp-4</div><div class="bar" style="width:16px"></div></div>
<div class="row"><div class="t">24</div><div class="l">sp-5</div><div class="bar" style="width:24px"></div></div>
<div class="row"><div class="t">32</div><div class="l">sp-6</div><div class="bar" style="width:32px"></div></div>
<div class="row"><div class="t">48</div><div class="l">sp-7</div><div class="bar" style="width:48px"></div></div>
<div class="row"><div class="t">64</div><div class="l">sp-8</div><div class="bar" style="width:64px"></div></div>
</body></html>

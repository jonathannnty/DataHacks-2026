<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&family=Special+Elite&display=swap">
<style>
body{margin:0;padding:18px;background:#faf6ec;font-family:'IBM Plex Sans',sans-serif;color:#0f172a}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;
  border-radius:4px;border:0;cursor:pointer;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:12px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;
  line-height:1;
  transition:background .15s, border-color .15s, transform .05s;
}
.btn:active{transform:translateY(1px)}
.prim{background:#047857;color:#f5ecd7;box-shadow:inset 0 -2px 0 rgba(0,0,0,.25)}
.prim:hover{background:#065f46}
.sec{background:#1a1410;color:#f5ecd7;box-shadow:inset 0 -2px 0 rgba(0,0,0,.3)}
.sec:hover{background:#2d1f17}
.ghost{background:transparent;color:#1a1410;border:1.5px solid rgba(107,74,43,.45);letter-spacing:.14em}
.ghost:hover{border-color:#047857;color:#047857;background:rgba(4,120,87,.05)}
.danger{background:#a8242b;color:#f5ecd7;box-shadow:inset 0 -2px 0 rgba(0,0,0,.3)}
.danger:hover{background:#7f1d1d}

.lbl{font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#8d6a3e;width:100%;margin-top:4px}

/* Choice button (dossier): serif feel, thicker weight — not typewriter */
.choice{
  padding:13px 16px;align-items:flex-start;text-align:left;max-width:380px;
  background:#fff9ea;border:1px solid rgba(107,74,43,.3);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:13.5px;font-weight:500;letter-spacing:.005em;text-transform:none;
  line-height:1.4;color:#1a1410;
  border-radius:4px;
}
.choice .k{
  display:inline-flex;width:22px;height:22px;
  background:#1a1410;color:#f5ecd7;
  align-items:center;justify-content:center;
  font-family:'Special Elite';font-size:12px;font-weight:700;
  margin-right:10px;margin-top:-1px;border-radius:2px;flex-shrink:0;
}
.choice:hover{border-color:#047857;background:#fff}
</style></head><body>

<div class="lbl">Primary · Secondary · Ghost · Danger</div>
<div class="row">
  <button class="btn prim">Enact Policy</button>
  <button class="btn sec">Action Center</button>
  <button class="btn ghost">Cancel</button>
  <button class="btn danger">Declare Emergency</button>
</div>

<div class="lbl">Choice button (dossier)</div>
<div class="row">
  <button class="btn choice"><span class="k">A</span><span>Launch the Green Mandate with immediate source-reduction policies.</span></button>
</div>

</body></html>

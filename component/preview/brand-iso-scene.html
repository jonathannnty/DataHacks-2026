<!doctype html><html><head><meta charset="utf-8"><title>Isometric scene</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap">
<style>
  html,body{margin:0;height:100%}
  body{background:radial-gradient(ellipse at 50% 30%,#1e293b 0%,#0f172a 70%,#020617 100%);display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;overflow:hidden}
  .frame{position:relative;width:680px;height:340px;overflow:hidden;border-radius:10px;box-shadow:inset 0 0 0 4px #1f1915,inset 0 0 0 6px #c9a66b,inset 0 4px 14px rgba(0,0,0,.55);background:#0c1324}
  .stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  svg{display:block;filter:drop-shadow(0 14px 20px rgba(0,0,0,.45))}
</style></head><body>
<div class="frame">
  <div class="stage">
    <svg id="scene" viewBox="-320 -180 640 360" width="640" height="340"></svg>
  </div>
</div>

<script>
const svgNS='http://www.w3.org/2000/svg';
const scene=document.getElementById('scene');

// Iso constants
const TW=36, TH=18;          // tile half-width, half-height
const THK=8;                 // ground thickness (dirt side)
const W=9, H=7;               // grid
function iso(x,y){return [(x-y)*TW,(x+y)*TH];}

function el(name,attrs){
  const e=document.createElementNS(svgNS,name);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

// =============== MAP LAYOUT ===============
// types: g grass, r road, w water, t tree(cluster)
function tileType(x,y){
  if(x===8) return 'w';           // river on right
  if(y===3) return 'r';           // east-west main road
  if(x===4) return 'r';           // north-south road
  // tree tiles scattered
  if((x===1&&y===1)||(x===6&&y===1)||(x===2&&y===5)||(x===6&&y===5)||(x===0&&y===4)) return 't';
  return 'g';
}

// Buildings (house variants + civic)
// types: hall, mrf, land, ind, hA hB hC (house variants)
const BLDGS = [
  {x:1,y:0,t:'hA'},
  {x:3,y:0,t:'hB'},
  {x:5,y:0,t:'hC'},
  {x:7,y:0,t:'hA'},
  {x:0,y:2,t:'hall'},
  {x:2,y:2,t:'hC'},
  {x:6,y:2,t:'hB'},
  {x:7,y:2,t:'hA'},
  {x:1,y:4,t:'mrf'},
  {x:3,y:4,t:'hB'},
  {x:6,y:4,t:'land'},
  {x:7,y:4,t:'ind'},
  {x:2,y:6,t:'hA'},
  {x:5,y:6,t:'hC'},
  {x:7,y:6,t:'hB'},
];

// painter order: sort items by (x+y) then kind
const items=[];
for(let y=0;y<H;y++) for(let x=0;x<W;x++){
  items.push({depth:(x+y)*10, kind:'tile', x, y, type:tileType(x,y)});
}
BLDGS.forEach(b=>{
  const tt=tileType(b.x,b.y);
  if(tt==='r'||tt==='w') return; // don't place on road/water
  items.push({depth:(b.x+b.y)*10+5, kind:'bldg', x:b.x, y:b.y, type:b.t});
});
items.sort((a,b)=>a.depth-b.depth);

// =============== TILE DRAWERS ===============
// Each tile is a diamond with thickness (side walls) below it.
function drawGrassTile(gx,gy){
  const [sx,sy]=iso(gx,gy);
  const g=el('g',{transform:`translate(${sx} ${sy})`});

  // Right side wall (dirt) — darker
  g.appendChild(el('polygon',{
    points:`0,${TH} ${TW},0 ${TW},${THK} 0,${TH+THK}`,
    fill:'#7c5a34'
  }));
  // Left side wall (dirt) — slightly lighter
  g.appendChild(el('polygon',{
    points:`0,${TH} -${TW},0 -${TW},${THK} 0,${TH+THK}`,
    fill:'#9a7846'
  }));
  // Horizontal striations on side walls (dirt texture)
  for(let i=2;i<THK;i+=3){
    g.appendChild(el('path',{
      d:`M -${TW-4} ${i} L 0 ${TH-1+i/2} L ${TW-4} ${i}`,
      stroke:'rgba(60,40,20,.35)', 'stroke-width':.7, fill:'none'
    }));
  }
  // Top diamond — grass
  g.appendChild(el('polygon',{
    points:`0,-${TH} ${TW},0 0,${TH} -${TW},0`,
    fill:'#4ade80'
  }));
  // darker grass shading on lower half
  g.appendChild(el('polygon',{
    points:`-${TW},0 0,${TH} ${TW},0`,
    fill:'#22c55e', opacity:.6
  }));
  // grass texture flecks
  for(let i=0;i<4;i++){
    const rx=(Math.random()-.5)*TW*1.3;
    const ry=(Math.random()-.3)*TH*1.6;
    // keep inside diamond
    if(Math.abs(rx)/TW + Math.abs(ry)/TH > .9) continue;
    g.appendChild(el('line',{
      x1:rx,y1:ry,x2:rx,y2:ry-1.5,
      stroke:'#166534','stroke-width':.8,'stroke-linecap':'round'
    }));
  }
  scene.appendChild(g);
}

function drawRoadTile(gx,gy){
  const [sx,sy]=iso(gx,gy);
  const g=el('g',{transform:`translate(${sx} ${sy})`});
  // sides (darker asphalt base)
  g.appendChild(el('polygon',{points:`0,${TH} ${TW},0 ${TW},${THK} 0,${TH+THK}`, fill:'#3e3e3e'}));
  g.appendChild(el('polygon',{points:`0,${TH} -${TW},0 -${TW},${THK} 0,${TH+THK}`, fill:'#5a5a5a'}));
  // top asphalt
  g.appendChild(el('polygon',{points:`0,-${TH} ${TW},0 0,${TH} -${TW},0`, fill:'#6b6b6b'}));
  g.appendChild(el('polygon',{points:`0,-${TH} ${TW},0 0,${TH} -${TW},0`, fill:'#4a4a4a', opacity:.35}));

  // subtle aggregate
  for(let i=0;i<3;i++){
    const rx=(Math.random()-.5)*TW*1.5;
    const ry=(Math.random()-.5)*TH*1.5;
    if(Math.abs(rx)/TW + Math.abs(ry)/TH > .9) continue;
    g.appendChild(el('circle',{cx:rx,cy:ry,r:.5, fill:'#2e2e2e'}));
  }

  // determine road orientation from neighbors
  const isRoad=(x,y)=> x>=0&&x<W&&y>=0&&y<H && tileType(x,y)==='r';
  const N=isRoad(gx,gy-1), S=isRoad(gx,gy+1), E=isRoad(gx+1,gy), wE=isRoad(gx-1,gy);
  // direction = EW if (E||wE) and not(N||S), NS if vice versa, else intersection
  const horizontal = (E||wE);
  const vertical = (N||S);

  // Dashes perpendicular to travel direction (so they appear as lane dividers going along the road).
  // iso axes: x+ grows along +X world = direction (1,-1) screen (TW,-TH)? No — iso(x,y)=(x-y)*TW,(x+y)*TH.
  // Moving east (x+): screen delta = (TW, TH). So "along road east" = that diagonal.
  // Moving south (y+): screen delta = (-TW, TH). Along road south = that diagonal.
  // Dashes along-direction are short line segments oriented along that diagonal (they look like lane paint stripes).
  const addDash=(cx,cy,dir)=>{
    // dir = 'ew' -> segment along (TW,TH); 'ns' -> along (-TW,TH)
    const len=10;
    let dx,dy;
    if(dir==='ew'){dx=TW/Math.hypot(TW,TH)*len/2; dy=TH/Math.hypot(TW,TH)*len/2;}
    else         {dx=-TW/Math.hypot(TW,TH)*len/2; dy=TH/Math.hypot(TW,TH)*len/2;}
    g.appendChild(el('line',{
      x1:cx-dx,y1:cy-dy,x2:cx+dx,y2:cy+dy,
      stroke:'#f5ecd7','stroke-width':1.6,'stroke-linecap':'round',opacity:.85
    }));
  };

  if(horizontal && !vertical){
    // center line along east-west direction
    // place 2 dashes along the diagonal
    addDash(-TW/2, -TH/4, 'ew');
    addDash( TW/2,  TH/4, 'ew');
  } else if(vertical && !horizontal){
    addDash(-TW/2,  TH/4, 'ns');
    addDash( TW/2, -TH/4, 'ns');
  } else if(horizontal && vertical){
    // 4-way intersection: crosswalk ticks at edges
    // east edge ticks (perp to ew direction)
    const addTick=(cx,cy,dir)=>{
      const len=5;
      let dx,dy;
      if(dir==='ew-perp'){dx=-TW/Math.hypot(TW,TH)*len/2; dy=TH/Math.hypot(TW,TH)*len/2;}
      else{dx=TW/Math.hypot(TW,TH)*len/2; dy=TH/Math.hypot(TW,TH)*len/2;}
      g.appendChild(el('line',{
        x1:cx-dx,y1:cy-dy,x2:cx+dx,y2:cy+dy,
        stroke:'#f5ecd7','stroke-width':1.2,opacity:.75
      }));
    };
    [-5,0,5].forEach(o=>addTick(TW*.55 + o*.3,-o*.2,'ew-perp'));
    [-5,0,5].forEach(o=>addTick(-TW*.55 + o*.3,-o*.2,'ew-perp'));
  }

  scene.appendChild(g);
}

function drawWaterTile(gx,gy){
  const [sx,sy]=iso(gx,gy);
  const g=el('g',{transform:`translate(${sx} ${sy})`});
  // deep sides
  g.appendChild(el('polygon',{points:`0,${TH} ${TW},0 ${TW},${THK+4} 0,${TH+THK+4}`, fill:'#075985'}));
  g.appendChild(el('polygon',{points:`0,${TH} -${TW},0 -${TW},${THK+4} 0,${TH+THK+4}`, fill:'#0c4a6e'}));
  // water top
  g.appendChild(el('polygon',{points:`0,-${TH} ${TW},0 0,${TH} -${TW},0`, fill:'#38bdf8'}));
  // darker near-shore shadow if grass tile west
  const westIsLand = gx>0 && tileType(gx-1,gy)!=='w';
  if(westIsLand){
    g.appendChild(el('polygon',{points:`-${TW},0 0,-${TH} 0,${TH}`, fill:'#075985', opacity:.35}));
  }
  // ripples
  g.appendChild(el('path',{d:`M -10,-2 q 4,-3 8,0 t 8,0`, stroke:'#fff',fill:'none','stroke-width':.8,opacity:.6}));
  g.appendChild(el('path',{d:`M -12,5 q 4,-3 8,0 t 8,0`, stroke:'#fff',fill:'none','stroke-width':.6,opacity:.4}));
  scene.appendChild(g);
}

function drawTreeTile(gx,gy){
  // draw grass base first
  drawGrassTile(gx,gy);
  const [sx,sy]=iso(gx,gy);
  const g=el('g',{transform:`translate(${sx} ${sy})`});
  // cluster of 3-4 trees
  const positions=[
    [-TW*.4, -TH*.2, 1.0],
    [ TW*.3, -TH*.1, .85],
    [ TW*.1,  TH*.3, .9],
    [-TW*.2,  TH*.1, .75],
  ];
  // sort by y so front trees paint on top
  positions.sort((a,b)=>a[1]-b[1]);
  positions.forEach(([x,y,s])=>{
    // shadow
    g.appendChild(el('ellipse',{cx:x,cy:y+2,rx:5*s,ry:2*s, fill:'#000',opacity:.25}));
    // trunk
    g.appendChild(el('rect',{x:x-1.2*s,y:y-10*s,width:2.4*s,height:10*s, fill:'#6b3f1a'}));
    // foliage — layered circles for fullness
    g.appendChild(el('circle',{cx:x,cy:y-12*s,r:6*s, fill:'#14532d'}));
    g.appendChild(el('circle',{cx:x-3*s,cy:y-10*s,r:5*s, fill:'#166534'}));
    g.appendChild(el('circle',{cx:x+3*s,cy:y-14*s,r:5*s, fill:'#22c55e'}));
    g.appendChild(el('circle',{cx:x+1*s,cy:y-11*s,r:3.5*s, fill:'#4ade80'}));
  });
  scene.appendChild(g);
}

// =============== BUILDING DRAWERS ===============
// Helper: isometric box. w,d = half widths, h = height in screen px.
function isoBox(cx, cy, w, d, h, topFill, leftFill, rightFill){
  const g=el('g',{});
  const tw=w, td=d;
  const topY=cy-h;
  // right face (dark)
  g.appendChild(el('polygon',{
    points:`${cx+tw},${cy} ${cx+tw},${topY} ${cx},${topY+td} ${cx},${cy+td}`,
    fill:rightFill
  }));
  // left face (mid)
  g.appendChild(el('polygon',{
    points:`${cx-tw},${cy} ${cx-tw},${topY} ${cx},${topY+td} ${cx},${cy+td}`,
    fill:leftFill
  }));
  // top face (light)
  g.appendChild(el('polygon',{
    points:`${cx},${topY-td} ${cx+tw},${topY} ${cx},${topY+td} ${cx-tw},${topY}`,
    fill:topFill
  }));
  return g;
}

function houseVariant(type){
  // returns { wallL, wallR, wallTop, roof, accent, pitch }
  if(type==='hA') return {wallL:'#e0b885', wallR:'#c99562', wallTop:'#fde68a', roof:'#9a3412', pitch:10, accent:'#92400e'};
  if(type==='hB') return {wallL:'#9ab5c9', wallR:'#64809a', wallTop:'#cbdbe8', roof:'#1e3a8a', pitch:12, accent:'#1e40af'};
  if(type==='hC') return {wallL:'#c8a99a', wallR:'#a08074', wallTop:'#e7d3c7', roof:'#065f46', pitch:9,  accent:'#064e3b'};
  return {wallL:'#c99562',wallR:'#9a6f3a',wallTop:'#fde68a',roof:'#7c2d12',pitch:10,accent:'#78350f'};
}

function drawHouse(cx,cy,type){
  const v=houseVariant(type);
  const w=TW*.4, d=TH*.4, h=14;
  const g=el('g',{});
  // base box
  g.appendChild(isoBox(cx, cy, w, d, h, v.wallTop, v.wallL, v.wallR));
  // pitched roof — two sloped polygons forming a ridge along (x) direction
  const topY = cy-h;
  // ridge point (raised along Y)
  const ridgeY = topY - v.pitch;
  // roof front (facing viewer) — left half, right half
  g.appendChild(el('polygon',{
    points:`${cx-w-2},${topY} ${cx},${topY+d+1} ${cx},${ridgeY+d/2} ${cx-w-2},${ridgeY-d/2}`,
    fill:v.roof
  }));
  g.appendChild(el('polygon',{
    points:`${cx+w+2},${topY} ${cx},${topY+d+1} ${cx},${ridgeY+d/2} ${cx+w+2},${ridgeY-d/2}`,
    fill:v.roof, opacity:.85
  }));
  // roof ridge line
  g.appendChild(el('line',{x1:cx-w-2,y1:ridgeY-d/2,x2:cx+w+2,y2:ridgeY-d/2, stroke:v.accent,'stroke-width':1}));
  // chimney
  g.appendChild(el('rect',{x:cx+w*.3,y:ridgeY-6-d/2,width:3,height:6, fill:v.accent}));
  // window on left face (which is front-facing in iso)
  g.appendChild(el('rect',{x:cx-w*.6, y:cy-h*.6, width:5, height:5, fill:'#93c5fd', stroke:v.accent, 'stroke-width':.6}));
  g.appendChild(el('line',{x1:cx-w*.6+2.5,y1:cy-h*.6,x2:cx-w*.6+2.5,y2:cy-h*.6+5, stroke:v.accent,'stroke-width':.4}));
  g.appendChild(el('line',{x1:cx-w*.6,y1:cy-h*.6+2.5,x2:cx-w*.6+5,y2:cy-h*.6+2.5, stroke:v.accent,'stroke-width':.4}));
  // door on right face
  g.appendChild(el('rect',{x:cx+1, y:cy-h*.7, width:4, height:h*.7, fill:v.accent}));
  g.appendChild(el('circle',{cx:cx+4.3, cy:cy-h*.35, r:.5, fill:'#fde68a'}));
  return g;
}

function drawHall(cx,cy){
  const w=TW*.65, d=TH*.65, h=22;
  const g=el('g',{});
  // base
  g.appendChild(isoBox(cx,cy,w,d,h,'#f1e7c9','#d6c7a3','#b9a77d'));
  // portico columns on front (left face)
  for(let i=0;i<4;i++){
    const px = cx - w + 4 + i*(w*2-8)/3;
    g.appendChild(el('rect',{x:px-1, y:cy-h+4, width:2, height:h-4, fill:'#fafaf9'}));
    g.appendChild(el('rect',{x:px-1.5,y:cy-h+2,width:3,height:2, fill:'#d6d3d1'}));
    g.appendChild(el('rect',{x:px-1.5,y:cy-2,width:3,height:2, fill:'#d6d3d1'}));
  }
  // pediment (triangle roof front)
  const topY=cy-h;
  g.appendChild(el('polygon',{
    points:`${cx-w-3},${topY} ${cx+w+3},${topY} ${cx},${topY-10}`,
    fill:'#1e3a8a'
  }));
  // dome
  g.appendChild(el('ellipse',{cx:cx, cy:topY-12, rx:6, ry:4, fill:'#1e3a8a'}));
  g.appendChild(el('rect',{x:cx-.5, y:topY-20, width:1, height:5, fill:'#1e3a8a'}));
  g.appendChild(el('circle',{cx:cx, cy:topY-21, r:1.2, fill:'#facc15'}));
  // flag
  g.appendChild(el('rect',{x:cx+1, y:topY-19, width:6, height:3.5, fill:'#10b981'}));
  // big double doors
  g.appendChild(el('rect',{x:cx-3, y:cy-10, width:6, height:10, fill:'#78350f'}));
  g.appendChild(el('line',{x1:cx,y1:cy-10,x2:cx,y2:cy,stroke:'#fafaf9','stroke-width':.5}));
  return g;
}

function drawMRF(cx,cy){
  const w=TW*.7, d=TH*.7, h=16;
  const g=el('g',{});
  g.appendChild(isoBox(cx,cy,w,d,h,'#a7f3d0','#059669','#065f46'));
  // sawtooth roof profile — 3 teeth
  const topY=cy-h;
  for(let i=0;i<3;i++){
    const x1=cx-w+2 + i*(w*2-4)/3;
    const x2=cx-w+2 + (i+1)*(w*2-4)/3;
    // ridge shape
    g.appendChild(el('polygon',{
      points:`${x1},${topY} ${x2},${topY} ${(x1+x2)/2},${topY-6}`,
      fill:'#047857'
    }));
    // skylight glass (left slope)
    g.appendChild(el('polygon',{
      points:`${x1},${topY} ${(x1+x2)/2},${topY-6} ${(x1+x2)/2-1},${topY-1}`,
      fill:'#7dd3fc', opacity:.7
    }));
  }
  // smokestack
  g.appendChild(el('rect',{x:cx+w*.6, y:topY-14, width:3, height:14, fill:'#374151'}));
  g.appendChild(el('ellipse',{cx:cx+w*.6+1.5, cy:topY-15, rx:4, ry:2, fill:'#94a3b8', opacity:.6}));
  // roll-up door
  g.appendChild(el('rect',{x:cx-5, y:cy-8, width:10, height:8, fill:'#0f172a'}));
  for(let i=0;i<4;i++) g.appendChild(el('line',{x1:cx-5,y1:cy-8+i*2,x2:cx+5,y2:cy-8+i*2,stroke:'#374151','stroke-width':.3}));
  // recycle sign on wall
  g.appendChild(el('circle',{cx:cx-w*.5, cy:cy-h*.5, r:3, fill:'#064e3b'}));
  const r=el('text',{x:cx-w*.5, y:cy-h*.5+1.5,'text-anchor':'middle','font-family':'Inter','font-size':4,'font-weight':800,fill:'#a7f3d0'});
  r.textContent='♻'; g.appendChild(r);
  return g;
}

function drawLandfill(cx,cy){
  const g=el('g',{});
  // dirt mound
  g.appendChild(el('ellipse',{cx, cy:cy+TH*.3, rx:TW*.85, ry:TH*.6, fill:'#78350f', opacity:.6}));
  g.appendChild(el('ellipse',{cx, cy:cy-4, rx:TW*.8, ry:TH*.85, fill:'#a16207'}));
  g.appendChild(el('ellipse',{cx, cy:cy-6, rx:TW*.65, ry:TH*.7, fill:'#b45309'}));
  // garbage bags poking out
  g.appendChild(el('ellipse',{cx:cx-8, cy:cy-12, rx:4, ry:3, fill:'#1f2937'}));
  g.appendChild(el('ellipse',{cx:cx+4, cy:cy-16, rx:3.5, ry:2.5, fill:'#1f2937'}));
  g.appendChild(el('ellipse',{cx:cx+10, cy:cy-9, rx:3, ry:2, fill:'#1c1917'}));
  g.appendChild(el('ellipse',{cx:cx-4, cy:cy-20, rx:3, ry:2, fill:'#3f3f46'}));
  // bulldozer tracks
  g.appendChild(el('path',{d:`M ${cx-TW*.6} ${cy+2} Q ${cx-4} ${cy-10} ${cx+TW*.5} ${cy-4}`, stroke:'#4a2f13','stroke-width':.7,fill:'none','stroke-dasharray':'2 2'}));
  // caution flag
  g.appendChild(el('line',{x1:cx-10,y1:cy-20,x2:cx-10,y2:cy-32,stroke:'#1c1917','stroke-width':1}));
  g.appendChild(el('polygon',{points:`${cx-10},${cy-32} ${cx-4},${cy-30} ${cx-10},${cy-28}`, fill:'#f59e0b'}));
  // circling gull
  g.appendChild(el('path',{d:`M ${cx+12} ${cy-24} q 2,-2 4,0 q 2,-2 4,0`,stroke:'#f5ecd7','stroke-width':.8,fill:'none'}));
  return g;
}

function drawIndustrial(cx,cy){
  const w=TW*.55, d=TH*.55, h=13;
  const g=el('g',{});
  g.appendChild(isoBox(cx,cy,w,d,h,'#d6d3d1','#78716c','#44403c'));
  // flat roof with pipes
  const topY=cy-h;
  g.appendChild(el('rect',{x:cx-w*.3, y:topY-6, width:2, height:6, fill:'#57534e'}));
  g.appendChild(el('rect',{x:cx+w*.2, y:topY-9, width:2.5, height:9, fill:'#292524'}));
  g.appendChild(el('ellipse',{cx:cx+w*.2+1.2, cy:topY-10, rx:3, ry:1.5, fill:'#e7e5e4',opacity:.55}));
  // storage tank
  g.appendChild(el('ellipse',{cx:cx-w*.6, cy:topY-1, rx:3, ry:1.5, fill:'#a8a29e'}));
  g.appendChild(el('rect',{x:cx-w*.6-3, y:topY-1, width:6, height:6, fill:'#a8a29e'}));
  g.appendChild(el('ellipse',{cx:cx-w*.6, cy:topY+5, rx:3, ry:1.5, fill:'#78716c'}));
  // big bay door
  g.appendChild(el('rect',{x:cx-5, y:cy-9, width:10, height:9, fill:'#1c1917'}));
  g.appendChild(el('line',{x1:cx-5,y1:cy-4.5,x2:cx+5,y2:cy-4.5,stroke:'#57534e','stroke-width':.4}));
  return g;
}

function drawBldg(it){
  const [sx,sy]=iso(it.x,it.y);
  let g;
  switch(it.type){
    case 'hall': g=drawHall(sx,sy); break;
    case 'mrf':  g=drawMRF(sx,sy); break;
    case 'land': g=drawLandfill(sx,sy); break;
    case 'ind':  g=drawIndustrial(sx,sy); break;
    default:     g=drawHouse(sx,sy,it.type);
  }
  scene.appendChild(g);
}

// =============== MAIN PAINT ===============
for(const it of items){
  if(it.kind==='tile'){
    if(it.type==='g') drawGrassTile(it.x,it.y);
    else if(it.type==='r') drawRoadTile(it.x,it.y);
    else if(it.type==='w') drawWaterTile(it.x,it.y);
    else if(it.type==='t') drawTreeTile(it.x,it.y);
  } else {
    drawBldg(it);
  }
}

// center scene
const bbox=scene.getBBox();
const cx=bbox.x+bbox.width/2, cy=bbox.y+bbox.height/2;
scene.querySelectorAll(':scope > g, :scope > polygon, :scope > rect, :scope > ellipse, :scope > path, :scope > line, :scope > circle, :scope > text').forEach(()=>{});
// wrap all children in a single translate group
const wrapper = el('g',{transform:`translate(${-cx} ${-cy})`});
while(scene.firstChild) wrapper.appendChild(scene.firstChild);
scene.appendChild(wrapper);
</script>
</body></html>

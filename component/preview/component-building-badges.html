<!doctype html><html><head><meta charset="utf-8"><title>Building badges</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap">
<style>
body{margin:0;padding:18px;background:#1e293b;font-family:Inter;display:flex;flex-direction:column;gap:10px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.b{display:inline-flex;align-items:center;gap:6px;padding:4px 9px 4px 7px;border-radius:6px;font-size:10.5px;font-weight:800;border:1.5px solid;line-height:1}
.b svg{display:block;width:13px;height:13px;flex-shrink:0}
.def{background:#f1f5f9;color:#0f172a;border-color:#64748b}
.warn{background:#fde68a;color:#78350f;border-color:#f59e0b}
.dang{background:#fecaca;color:#7f1d1d;border-color:#ef4444}
.succ{background:#a7f3d0;color:#064e3b;border-color:#10b981}
.lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#94a3b8}
</style></head><body>

<!-- icon library: each building type as a tiny stroked glyph -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <!-- City Hall: columned pediment -->
    <symbol id="i-hall" viewBox="0 0 16 16">
      <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 6 L8 2 L14 6"/>
        <path d="M2.5 6 H13.5"/>
        <path d="M4 6 V12 M7 6 V12 M9 6 V12 M12 6 V12"/>
        <path d="M2 13 H14"/>
      </g>
    </symbol>

    <!-- Landfill: mound with flag -->
    <symbol id="i-landfill" viewBox="0 0 16 16">
      <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1.5 13 Q5 6 8 8 Q11 10 14.5 13 Z" fill="currentColor" fill-opacity=".15"/>
        <path d="M10 10 V3"/>
        <path d="M10 3 L13 4 L10 5.5"/>
      </g>
    </symbol>

    <!-- MRF: recycle triangle -->
    <symbol id="i-mrf" viewBox="0 0 16 16">
      <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2.5 L11 7.5 L5 7.5 Z"/>
        <path d="M3 13 L6 8 L9 13 Z" transform="rotate(-120 8 9)"/>
        <path d="M3 13 L6 8 L9 13 Z" transform="rotate(120 8 9)"/>
      </g>
    </symbol>

    <!-- Residential: house -->
    <symbol id="i-res" viewBox="0 0 16 16">
      <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2.5 8 L8 3 L13.5 8 V13 H2.5 Z"/>
        <path d="M6.5 13 V10 H9.5 V13"/>
      </g>
    </symbol>

    <!-- Industrial: smokestacks / factory -->
    <symbol id="i-ind" viewBox="0 0 16 16">
      <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 13 V7 L6 9 V7 L10 9 V5 H13.5 V13 Z"/>
        <path d="M11 3 Q11.6 4 11 5 Q10.4 6 11 7"/>
      </g>
    </symbol>
  </defs>
</svg>

<div class="lbl">Building tone · default / warning / danger / success</div>
<div class="row">
  <span class="b def"><svg><use href="#i-hall"/></svg>City Hall</span>
  <span class="b warn"><svg><use href="#i-landfill"/></svg>Landfill 72%</span>
  <span class="b dang"><svg><use href="#i-landfill"/></svg>Landfill 88%</span>
  <span class="b succ"><svg><use href="#i-mrf"/></svg>MRF online</span>
  <span class="b def"><svg><use href="#i-res"/></svg>Residential</span>
  <span class="b def"><svg><use href="#i-ind"/></svg>Industrial</span>
</div>
</body></html>
